# Workflow name displayed in GitHub Actions UI
name: Test and Deploy

# Trigger events: when to run this workflow
on:
  push:
    branches: [ main, master ]  # Run on push to main or master
  pull_request:
    branches: [ main, master ]  # Run on PR to main or master

# Jobs define the tasks to run
jobs:
  test-and-deploy:
    runs-on: self-hosted  # Use self-hosted Windows runner
    
    # Steps are the individual tasks in the job
    steps:
      # Step 1: Download repository code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Install Python 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # Step 3: Install required Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sales-analytics-demo/requirements.txt
      
      # Step 4: Run unit tests with pytest
      - name: Run pytest
        run: |
          cd sales-analytics-demo
          python -m pytest tests/ -v
      
      # Step 5: Create deployment directory if it doesn't exist (only runs if tests pass)
      - name: Create deployment directory
        if: success()  # Conditional: only run if previous steps succeeded
        run: |
          if (!(Test-Path "C:\Deployments\SalesApp")) {
            New-Item -ItemType Directory -Path "C:\Deployments\SalesApp" -Force
          }
        shell: pwsh  # Use PowerShell for Windows commands
      
      # Step 6: Copy source files to deployment directory (only runs if tests pass)
      - name: Copy files to deployment directory
        if: success()  # Conditional: only run if previous steps succeeded
        run: |
          Copy-Item -Path "sales-analytics-demo\src\*" -Destination "C:\Deployments\SalesApp" -Recurse -Force
        shell: pwsh  # Use PowerShell for Windows commands
      
      # Step 7: Verify deployment by listing copied files (only runs if tests pass)
      - name: Verify deployment
        if: success()  # Conditional: only run if previous steps succeeded
        run: |
          Get-ChildItem "C:\Deployments\SalesApp"
        shell: pwsh  # Use PowerShell for Windows commands
