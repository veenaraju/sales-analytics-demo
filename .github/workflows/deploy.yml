# Workflow name displayed in GitHub Actions UI
name: Test and Deploy

# Trigger events: when to run this workflow
on:
  push:
    branches:
      - main  # Run on push to main branch
      - master  # Run on push to master branch

  pull_request:
    branches:
      - main  # Run on PR to main branch
      - master  # Run on PR to master branch

# Jobs define the tasks to run
jobs:
  test-and-deploy:

    runs-on: self-hosted  # Use self-hosted Windows runner

    # Steps are the individual tasks in the job
    steps:

      # Step 1: Download repository code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4  # Official GitHub action to checkout code


      # Step 3: Install required Python packages from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip  # Upgrade pip to latest version
          pip install -r requirements.txt  # Install packages from requirements file

      # Step 4: Run unit tests using pytest with verbose output
      - name: Run tests
        run: |
          python -m pytest tests -v  # Run pytest on tests folder with verbose output

      # Step 5: Create deployment folder if it doesn't exist
      - name: Create deployment folder
        shell: pwsh  # Use PowerShell for Windows commands
        run: |
          New-Item `  # PowerShell command to create new item
            -ItemType Directory `  # Specify item type as Directory
            -Path "D:\Python_Projects\windsurf\SalesAnalyticsDemo\Deployments\SalesApp" `  # Target path
            -Force  # Overwrite if already exists

      # Step 6: Copy application files from src to deployment folder
      - name: Deploy files
        shell: pwsh  # Use PowerShell for Windows commands
        run: |
          Copy-Item `  # PowerShell command to copy files
            -Path "src\*" `  # Source path (all files in src folder)
            -Destination "D:\Python_Projects\windsurf\SalesAnalyticsDemo\Deployments\SalesApp" `  # Destination path
            -Recurse `  # Copy all subdirectories and files
            -Force  # Overwrite existing files

      # Verify deployment
      - name: Verify deployment
        shell: pwsh
        run: |
          Write-Host "Deployment completed successfully"
          Get-ChildItem `
            "D:\Python_Projects\windsurf\SalesAnalyticsDemo\Deployments\SalesApp" `
            -Recurse